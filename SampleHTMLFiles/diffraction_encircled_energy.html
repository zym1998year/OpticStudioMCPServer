const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const margin = { top: 30, right: 30, bottom: 50, left: 65 };
const pw = W - margin.left - margin.right;
const ph = H - margin.top - margin.bottom;

function xToCanvas(v) { return margin.left + (v / 50) * pw; }
function yToCanvas(v) { return margin.top + (1 - v) * ph; }

// Grid
ctx.strokeStyle = '#2a2a4a';
ctx.lineWidth = 0.5;
for (let i = 0; i <= 10; i++) {
    let x = margin.left + (i / 10) * pw;
    ctx.beginPath(); ctx.moveTo(x, margin.top); ctx.lineTo(x, margin.top + ph); ctx.stroke();
    let y = margin.top + (i / 10) * ph;
    ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(margin.left + pw, y); ctx.stroke();
}

// Axes
ctx.strokeStyle = '#666';
ctx.lineWidth = 1;
ctx.beginPath();
ctx.moveTo(margin.left, margin.top);
ctx.lineTo(margin.left, margin.top + ph);
ctx.lineTo(margin.left + pw, margin.top + ph);
ctx.stroke();

// Axis labels
ctx.fillStyle = '#ccc';
ctx.font = '12px Segoe UI';
ctx.textAlign = 'center';
for (let i = 0; i <= 10; i++) {
    let v = i * 5;
    ctx.fillText(v, xToCanvas(v), margin.top + ph + 20);
}
ctx.fillText('Radius (\u00b5m)', margin.left + pw / 2, H - 6);

ctx.textAlign = 'right';
for (let i = 0; i <= 10; i++) {
    let v = i / 10;
    ctx.fillText(v.toFixed(1), margin.left - 8, yToCanvas(v) + 4);
}
ctx.save();
ctx.translate(14, margin.top + ph / 2);
ctx.rotate(-Math.PI / 2);
ctx.textAlign = 'center';
ctx.fillText('Fraction of Enclosed Energy', 0, 0);
ctx.restore();

// 80% reference line
ctx.strokeStyle = '#444';
ctx.lineWidth = 0.8;
ctx.setLineDash([3, 3]);
ctx.beginPath();
ctx.moveTo(margin.left, yToCanvas(0.8));
ctx.lineTo(margin.left + pw, yToCanvas(0.8));
ctx.stroke();
ctx.setLineDash([]);
ctx.fillStyle = '#666';
ctx.textAlign = 'left';
ctx.font = '10px Segoe UI';
ctx.fillText('80%', margin.left + pw + 3, yToCanvas(0.8) + 3);

// Plot curves
const legendEl = document.getElementById('legend');
for (const [label, d] of Object.entries(data)) {
    ctx.strokeStyle = d.color;
    ctx.lineWidth = label === "Diffraction Limit" ? 2 : 2.5;
    ctx.setLineDash(d.dash);
    ctx.beginPath();
    for (let i = 0; i < d.r.length; i++) {
        const x = xToCanvas(d.r[i]);
        const y = yToCanvas(d.f[i]);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Legend
    const item = document.createElement('div');
    item.className = 'legend-item';
    const swatch = document.createElement('div');
    swatch.className = 'legend-color' + (d.dash.length ? ' dashed' : '');
    swatch.style.setProperty('--c', d.color);
    if (!d.dash.length) swatch.style.background = d.color;
    item.appendChild(swatch);
    const text = document.createElement('span');
    text.textContent = label;
    item.appendChild(text);
    legendEl.appendChild(item);
}
