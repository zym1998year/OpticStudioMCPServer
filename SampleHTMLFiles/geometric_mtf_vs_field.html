const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const pad = {top: 30, right: 30, bottom: 50, left: 65};
const plotW = W - pad.left - pad.right;
const plotH = H - pad.top - pad.bottom;

const yMin = 0.2, yMax = 1.0;
const xMin = 0, xMax = maxField;

function toX(deg) { return pad.left + (deg / xMax) * plotW; }
function toY(v) { return pad.top + plotH - ((v - yMin) / (yMax - yMin)) * plotH; }

// Grid lines
ctx.strokeStyle = '#ddd';
ctx.lineWidth = 0.5;
for (let y = yMin; y <= yMax + 0.001; y += 0.1) {
  ctx.beginPath(); ctx.moveTo(pad.left, toY(y)); ctx.lineTo(pad.left + plotW, toY(y)); ctx.stroke();
}
for (let x = 0; x <= xMax; x += 2) {
  ctx.beginPath(); ctx.moveTo(toX(x), pad.top); ctx.lineTo(toX(x), pad.top + plotH); ctx.stroke();
}

// Axes
ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
ctx.strokeRect(pad.left, pad.top, plotW, plotH);

// Tick labels
ctx.fillStyle = '#333'; ctx.font = '12px Arial'; ctx.textAlign = 'center';
for (let x = 0; x <= xMax; x += 2) {
  ctx.fillText(x + '\u00B0', toX(x), pad.top + plotH + 20);
}
ctx.textAlign = 'right';
for (let y = yMin; y <= yMax + 0.001; y += 0.1) {
  ctx.fillText(y.toFixed(1), pad.left - 8, toY(y) + 4);
}

// Axis titles
ctx.save();
ctx.translate(16, pad.top + plotH / 2);
ctx.rotate(-Math.PI / 2);
ctx.textAlign = 'center'; ctx.font = '14px Arial';
ctx.fillText('Modulation', 0, 0);
ctx.restore();
ctx.textAlign = 'center'; ctx.font = '14px Arial';
ctx.fillText('Field Angle (degrees)', pad.left + plotW / 2, H - 5);

// Draw curves
function drawLine(vals, color, dashed) {
  const n = vals.length;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.setLineDash(dashed ? [8, 4] : []);
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const relField = i / (n - 1);
    const x = toX(relField * maxField);
    const y = toY(vals[i]);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

const legendEl = document.getElementById('legend');

data.forEach(d => {
  drawLine(d.tan, d.color, false);
  drawLine(d.sag, d.color, true);
  legendEl.innerHTML +=
    `<div class="legend-item"><div class="legend-line" style="background:${d.color}"></div>${d.freq} cy/mm T</div>` +
    `<div class="legend-item"><div class="legend-dash" style="border-color:${d.color}"></div>${d.freq} cy/mm S</div>`;
});
</script>
</body>
</html>
