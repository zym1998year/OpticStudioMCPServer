const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const margin = { top: 30, right: 30, bottom: 55, left: 75 };
const pw = W - margin.left - margin.right;
const ph = H - margin.top - margin.bottom;

const xMin = 0, xMax = 14;
const yMin = 0, yMax = 1.2;

function toX(v) { return margin.left + (v - xMin) / (xMax - xMin) * pw; }
function toY(v) { return margin.top + ph - (v - yMin) / (yMax - yMin) * ph; }

// Grid
ctx.strokeStyle = '#2a2a4a';
ctx.lineWidth = 0.5;
for (let x = 0; x <= 14; x += 2) {
  ctx.beginPath(); ctx.moveTo(toX(x), margin.top); ctx.lineTo(toX(x), margin.top + ph); ctx.stroke();
}
for (let y = 0; y <= 1.2; y += 0.2) {
  ctx.beginPath(); ctx.moveTo(margin.left, toY(y)); ctx.lineTo(margin.left + pw, toY(y)); ctx.stroke();
}

// Axes
ctx.strokeStyle = '#555';
ctx.lineWidth = 1;
ctx.beginPath();
ctx.moveTo(margin.left, margin.top);
ctx.lineTo(margin.left, margin.top + ph);
ctx.lineTo(margin.left + pw, margin.top + ph);
ctx.stroke();

// Tick labels
ctx.fillStyle = '#aaa';
ctx.font = '12px Segoe UI, sans-serif';
ctx.textAlign = 'center';
for (let x = 0; x <= 14; x += 2) {
  ctx.fillText(x + '\u00B0', toX(x), margin.top + ph + 22);
}
ctx.textAlign = 'right';
for (let y = 0; y <= 1.2; y += 0.2) {
  ctx.fillText(y.toFixed(1) + '%', margin.left - 10, toY(y) + 4);
}

// Axis labels
ctx.fillStyle = '#ccc';
ctx.font = '13px Segoe UI, sans-serif';
ctx.textAlign = 'center';
ctx.fillText('Field Angle (degrees)', margin.left + pw / 2, H - 8);
ctx.save();
ctx.translate(16, margin.top + ph / 2);
ctx.rotate(-Math.PI / 2);
ctx.fillText('F-Theta Distortion (%)', 0, 0);
ctx.restore();

// Plot curves
wavelengthData.forEach(wl => {
  ctx.strokeStyle = wl.color;
  ctx.lineWidth = 2.2;
  ctx.beginPath();
  for (let i = 0; i < wl.angles.length; i++) {
    const px = toX(wl.angles[i]);
    const py = toY(wl.distortion[i]);
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.stroke();
});
