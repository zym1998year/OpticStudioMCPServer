const canvas = document.getElementById('mtfChart');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const pad = { top: 30, right: 30, bottom: 50, left: 60 };
const pw = W - pad.left - pad.right, ph = H - pad.top - pad.bottom;

function drawGrid() {
  ctx.strokeStyle = '#2a3a5e';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 10; i++) {
    const x = pad.left + (i / 10) * pw;
    const y = pad.top + (i / 10) * ph;
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + ph); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + pw, y); ctx.stroke();
  }
}

function drawAxes() {
  ctx.strokeStyle = '#556';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, pad.top + ph); ctx.lineTo(pad.left + pw, pad.top + ph); ctx.stroke();

  ctx.fillStyle = '#ccc';
  ctx.font = '12px Arial';
  ctx.textAlign = 'center';
  for (let i = 0; i <= 10; i++) {
    const v = i * 10;
    const x = pad.left + (i / 10) * pw;
    ctx.fillText(v, x, pad.top + ph + 20);
  }
  ctx.fillText('Spatial Frequency (cycles/mm)', pad.left + pw / 2, pad.top + ph + 42);

  ctx.textAlign = 'right';
  for (let i = 0; i <= 10; i++) {
    const v = (1 - i / 10).toFixed(1);
    const y = pad.top + (i / 10) * ph;
    ctx.fillText(v, pad.left - 8, y + 4);
  }
  ctx.save();
  ctx.translate(15, pad.top + ph / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.fillText('Modulation', 0, 0);
  ctx.restore();
}

function plotLine(data, color, dashed) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.setLineDash(dashed ? [6, 4] : []);
  ctx.beginPath();
  for (let i = 0; i < data.length; i++) {
    const x = pad.left + (i / 100) * pw;
    const y = pad.top + (1 - data[i]) * ph;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

drawGrid();
drawAxes();
fields.forEach(f => {
  plotLine(f.tan, f.color, false);
  plotLine(f.sag, f.color, true);
});

// Legend
const legend = document.getElementById('legend');
fields.forEach(f => {
  legend.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${f.color}"></div><span>${f.label} T</span></div>`;
  legend.innerHTML += `<div class="legend-item"><div class="legend-color dashed" style="border-color:${f.color}"></div><span>${f.label} S</span></div>`;
});
