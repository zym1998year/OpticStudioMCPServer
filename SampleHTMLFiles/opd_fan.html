const pupil = [];
for (let i = 0; i <= 40; i++) pupil.push(-1 + i * 0.05);

function drawChart(canvas, data, title, xLabel) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const w = rect.width, h = rect.height;

    const margin = { top: 10, right: 15, bottom: 30, left: 55 };
    const pw = w - margin.left - margin.right;
    const ph = h - margin.top - margin.bottom;

    // Find y range
    let yMin = Infinity, yMax = -Infinity;
    for (const ab of data) {
        for (const v of ab) {
            if (v < yMin) yMin = v;
            if (v > yMax) yMax = v;
        }
    }
    const yPad = (yMax - yMin) * 0.08 || 0.5;
    yMin -= yPad; yMax += yPad;

    const xToCanvas = x => margin.left + ((x + 1) / 2) * pw;
    const yToCanvas = y => margin.top + ph - ((y - yMin) / (yMax - yMin)) * ph;

    // Background
    ctx.fillStyle = '#0f0f23';
    ctx.fillRect(0, 0, w, h);

    // Grid
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 0.5;
    // Horizontal grid
    const yTicks = 5;
    for (let i = 0; i <= yTicks; i++) {
        const yv = yMin + (yMax - yMin) * i / yTicks;
        const cy = yToCanvas(yv);
        ctx.beginPath(); ctx.moveTo(margin.left, cy); ctx.lineTo(w - margin.right, cy); ctx.stroke();
    }
    // Vertical grid
    for (let xv = -1; xv <= 1; xv += 0.5) {
        const cx = xToCanvas(xv);
        ctx.beginPath(); ctx.moveTo(cx, margin.top); ctx.lineTo(cx, margin.top + ph); ctx.stroke();
    }

    // Zero line
    if (yMin < 0 && yMax > 0) {
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 1;
        const zy = yToCanvas(0);
        ctx.beginPath(); ctx.moveTo(margin.left, zy); ctx.lineTo(w - margin.right, zy); ctx.stroke();
    }

    // Plot curves
    for (let wi = 0; wi < data.length; wi++) {
        ctx.strokeStyle = colors[wi];
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        for (let i = 0; i < pupil.length; i++) {
            const cx = xToCanvas(pupil[i]);
            const cy = yToCanvas(data[wi][i]);
            if (i === 0) ctx.moveTo(cx, cy); else ctx.lineTo(cx, cy);
        }
        ctx.stroke();
    }

    // Axes labels
    ctx.fillStyle = '#999';
    ctx.font = '11px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(xLabel, margin.left + pw / 2, h - 3);

    // Y tick labels
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (let i = 0; i <= yTicks; i++) {
        const yv = yMin + (yMax - yMin) * i / yTicks;
        ctx.fillText(yv.toFixed(2), margin.left - 5, yToCanvas(yv));
    }

    // X tick labels
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (let xv = -1; xv <= 1; xv += 0.5) {
        ctx.fillText(xv.toFixed(1), xToCanvas(xv), margin.top + ph + 4);
    }
}

const grid = document.getElementById('charts');

fields.forEach(f => {
    const label = document.createElement('div');
    label.className = 'field-label';
    label.textContent = `Field ${f.fieldNumber}: ${f.fieldValueDeg}°`;
    grid.appendChild(label);

    ['tangential', 'sagittal'].forEach(fan => {
        const container = document.createElement('div');
        container.className = 'chart-container';
        const titleDiv = document.createElement('div');
        titleDiv.className = 'chart-title';
        titleDiv.textContent = fan === 'tangential' ? 'Tangential (OPD vs Py)' : 'Sagittal (OPD vs Px)';
        container.appendChild(titleDiv);
        const canvas = document.createElement('canvas');
        canvas.style.width = '100%';
        canvas.style.height = '220px';
        container.appendChild(canvas);
        grid.appendChild(container);

        requestAnimationFrame(() => {
            drawChart(canvas, f[fan].aberration,
                fan === 'tangential' ? 'Tangential (OPD vs Py)' : 'Sagittal (OPD vs Px)',
                fan === 'tangential' ? 'Py' : 'Px');
        });
    });
});
