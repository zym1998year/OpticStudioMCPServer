<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MTF - Double Gauss 28° SYN3</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #1e1e1e; color: #ddd; margin: 20px; }
        .chart-container { width: 900px; height: 550px; margin: 0 auto; }
        h1 { text-align: center; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Polychromatic MTF &mdash; Double Gauss 28&deg; Field SYN3</h1>
    <div class="chart-container">
        <canvas id="mtfChart"></canvas>
    </div>

    const f1t = [1,0.99669,0.99278,0.98795,0.98235,0.97617,0.96945,0.96228,0.95473,0.94686,0.93873,0.93040,0.92191,0.91330,0.90461,0.89588,0.88711,0.87833,0.86957,0.86083,0.85214,0.84349,0.83490,0.82636,0.81790,0.80949,0.80116,0.79290,0.78472,0.77660,0.76855];

    const f2t = [1,0.99569,0.99014,0.98231,0.97253,0.96124,0.94861,0.93478,0.91993,0.90425,0.88793,0.87110,0.85394,0.83657,0.81912,0.80169,0.78437,0.76726,0.75040,0.73388,0.71774,0.70200,0.68672,0.67191,0.65758,0.64376,0.63044,0.61764,0.60535,0.59359,0.58235];

    const ctx = document.getElementById('mtfChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: freq,
            datasets: [
                { label: 'Diffraction Limit', data: dl, borderColor: '#888', borderDash: [6,3], borderWidth: 2, pointRadius: 0, fill: false },
                { label: '0° T', data: f1t, borderColor: '#00cc00', borderWidth: 2, pointRadius: 0, fill: false },

                { label: '14° T', data: f3t, borderColor: '#ff4444', borderWidth: 2, pointRadius: 0, fill: false },
                { label: '14° S', data: f3s, borderColor: '#ff4444', borderDash: [4,2], borderWidth: 2, pointRadius: 0, fill: false },

        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { title: { display: true, text: 'Spatial Frequency (cy/mm)', color: '#ccc' }, ticks: { color: '#aaa', maxTicksLimit: 16 }, grid: { color: '#333' } },
                y: { title: { display: true, text: 'Modulation', color: '#ccc' }, min: 0, max: 1, ticks: { color: '#aaa' }, grid: { color: '#333' } }
            },
            plugins: {
                legend: { labels: { color: '#ddd', usePointStyle: true, font: { size: 12 } } },
                tooltip: { mode: 'index', intersect: false }
            }
        }
    });
    </script>
</body>
</html>
