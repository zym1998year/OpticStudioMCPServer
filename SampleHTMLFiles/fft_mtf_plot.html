const canvas = document.getElementById('mtfChart');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const pad = { top: 30, right: 30, bottom: 50, left: 60 };
const plotW = W - pad.left - pad.right;
const plotH = H - pad.top - pad.bottom;

function xToPixel(freq) { return pad.left + (freq / 100) * plotW; }
function yToPixel(mtf) { return pad.top + (1 - mtf) * plotH; }

// Grid
ctx.strokeStyle = '#ddd';
ctx.lineWidth = 0.5;
for (let i = 0; i <= 10; i++) {
    let x = xToPixel(i * 10);
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + plotH); ctx.stroke();
    let y = yToPixel(i * 0.1);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + plotW, y); ctx.stroke();
}

// Axes
ctx.strokeStyle = '#000';
ctx.lineWidth = 1.5;
ctx.beginPath();
ctx.moveTo(pad.left, pad.top);
ctx.lineTo(pad.left, pad.top + plotH);
ctx.lineTo(pad.left + plotW, pad.top + plotH);
ctx.stroke();

// Axis labels
ctx.fillStyle = '#000';
ctx.font = '13px Arial';
ctx.textAlign = 'center';
ctx.fillText('Spatial Frequency (cycles/mm)', pad.left + plotW / 2, H - 8);
ctx.save();
ctx.translate(15, pad.top + plotH / 2);
ctx.rotate(-Math.PI / 2);
ctx.fillText('Modulus of the OTF', 0, 0);
ctx.restore();

// Tick labels
ctx.font = '11px Arial';
ctx.textAlign = 'center';
for (let i = 0; i <= 10; i++) {
    ctx.fillText((i * 10).toString(), xToPixel(i * 10), pad.top + plotH + 18);
}
ctx.textAlign = 'right';
for (let i = 0; i <= 10; i++) {
    ctx.fillText((i * 0.1).toFixed(1), pad.left - 5, yToPixel(i * 0.1) + 4);
}

// Draw diffraction limit
ctx.strokeStyle = '#000';
ctx.lineWidth = 2;
ctx.setLineDash([]);
ctx.beginPath();
for (let i = 0; i < data.diffLimit.length; i++) {
    let freq = i * 0.5;
    if (i === 0) ctx.moveTo(xToPixel(freq), yToPixel(data.diffLimit[i]));
    else ctx.lineTo(xToPixel(freq), yToPixel(data.diffLimit[i]));
}
ctx.stroke();

// Draw field curves
data.fields.forEach(field => {
    // Tangential (solid)
    ctx.strokeStyle = field.color;
    ctx.lineWidth = 1.8;
    ctx.setLineDash([]);
    ctx.beginPath();
    for (let i = 0; i < field.tan.length; i++) {
        let freq = i * 0.5;
        if (i === 0) ctx.moveTo(xToPixel(freq), yToPixel(field.tan[i]));
        else ctx.lineTo(xToPixel(freq), yToPixel(field.tan[i]));
    }
    ctx.stroke();

    // Sagittal (dashed)
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    for (let i = 0; i < field.sag.length; i++) {
        let freq = i * 0.5;
        if (i === 0) ctx.moveTo(xToPixel(freq), yToPixel(field.sag[i]));
        else ctx.lineTo(xToPixel(freq), yToPixel(field.sag[i]));
    }
    ctx.stroke();
});
ctx.setLineDash([]);

// Legend
const legend = document.getElementById('legend');
legend.innerHTML = '<div class="legend-item"><div class="legend-line" style="background:#000"></div>Diffraction Limit</div>';
data.fields.forEach(field => {
    legend.innerHTML += `<div class="legend-item"><div class="legend-line" style="background:${field.color}"></div>${field.label} T</div>`;
    legend.innerHTML += `<div class="legend-item"><div class="legend-dash" style="border-color:${field.color}"></div>${field.label} S</div>`;
});
</script>
</body>
</html>
