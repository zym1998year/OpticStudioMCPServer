const plotsDiv = document.getElementById('plots');

function drawPlot(canvas, title, pupil, aberrations) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const margin = {top: 10, right: 15, bottom: 30, left: 50};
  const pw = W - margin.left - margin.right;
  const ph = H - margin.top - margin.bottom;

  // Find Y range
  let yMin = Infinity, yMax = -Infinity;
  for (const ab of aberrations) {
    for (const v of ab) { if (v < yMin) yMin = v; if (v > yMax) yMax = v; }
  }
  const yPad = (yMax - yMin) * 0.1 || 5;
  yMin -= yPad; yMax += yPad;

  const xMin = -1, xMax = 1;
  const toX = v => margin.left + (v - xMin) / (xMax - xMin) * pw;
  const toY = v => margin.top + (1 - (v - yMin) / (yMax - yMin)) * ph;

  // Background
  ctx.fillStyle = '#0f1a30';
  ctx.fillRect(margin.left, margin.top, pw, ph);

  // Grid
  ctx.strokeStyle = '#2a3a5c';
  ctx.lineWidth = 0.5;
  // Horizontal zero line
  if (yMin < 0 && yMax > 0) {
    ctx.strokeStyle = '#4a5a7c';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(toX(-1), toY(0)); ctx.lineTo(toX(1), toY(0)); ctx.stroke();
  }
  // Vertical zero line
  ctx.beginPath(); ctx.moveTo(toX(0), margin.top); ctx.lineTo(toX(0), margin.top + ph); ctx.stroke();

  // Grid lines
  ctx.strokeStyle = '#2a3a5c'; ctx.lineWidth = 0.5;
  for (let x = -1; x <= 1; x += 0.5) {
    ctx.beginPath(); ctx.moveTo(toX(x), margin.top); ctx.lineTo(toX(x), margin.top + ph); ctx.stroke();
  }
  const yStep = niceStep(yMin, yMax, 5);
  for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax; y += yStep) {
    ctx.beginPath(); ctx.moveTo(margin.left, toY(y)); ctx.lineTo(margin.left + pw, toY(y)); ctx.stroke();
  }

  // Axes labels
  ctx.fillStyle = '#999'; ctx.font = '11px Segoe UI';
  ctx.textAlign = 'center';
  for (let x = -1; x <= 1; x += 0.5) {
    ctx.fillText(x.toFixed(1), toX(x), margin.top + ph + 15);
  }
  ctx.textAlign = 'right';
  for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax; y += yStep) {
    ctx.fillText(y.toFixed(1), margin.left - 5, toY(y) + 4);
  }

  // Axis titles
  ctx.fillStyle = '#888'; ctx.font = '10px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText('Pupil coordinate', margin.left + pw / 2, H - 2);

  // Plot curves
  for (let w = 0; w < aberrations.length; w++) {
    ctx.strokeStyle = colors[w];
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    for (let i = 0; i < pupil.length; i++) {
      const x = toX(pupil[i]), y = toY(aberrations[w][i]);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Border
  ctx.strokeStyle = '#3a4a6c'; ctx.lineWidth = 1;
  ctx.strokeRect(margin.left, margin.top, pw, ph);
}

function niceStep(min, max, targetTicks) {
  const range = max - min;
  const rough = range / targetTicks;
  const mag = Math.pow(10, Math.floor(Math.log10(rough)));
  const norm = rough / mag;
  let step;
  if (norm < 1.5) step = 1; else if (norm < 3.5) step = 2; else if (norm < 7.5) step = 5; else step = 10;
  return step * mag;
}

data.fields.forEach(field => {
  ['tangential','sagittal'].forEach(fan => {
    const container = document.createElement('div');
    container.className = 'plot-container';
    const title = document.createElement('div');
    title.className = 'plot-title';
    const fanLabel = fan === 'tangential' ? 'Tangential (EY vs PY)' : 'Sagittal (EX vs PX)';
    title.textContent = `${fanLabel} — Field ${field.fieldNumber}: ${field.fieldValueDeg}°`;
    container.appendChild(title);
    const canvas = document.createElement('canvas');
    canvas.style.width = '100%';
    canvas.style.height = '280px';
    container.appendChild(canvas);
    plotsDiv.appendChild(container);

    const fd = field[fan];
    requestAnimationFrame(() => drawPlot(canvas, '', fd.pupilCoordinates, fd.aberration));
  });
});

window.addEventListener('resize', () => {
  document.querySelectorAll('canvas').forEach((canvas, idx) => {
    const fieldIdx = Math.floor(idx / 2);
    const fanType = idx % 2 === 0 ? 'tangential' : 'sagittal';
    const fd = data.fields[fieldIdx][fanType];
    drawPlot(canvas, '', fd.pupilCoordinates, fd.aberration);
  });
});
</script>
