const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const pad = {top:30, right:30, bottom:50, left:65};
const pw = W - pad.left - pad.right;
const ph = H - pad.top - pad.bottom;

// Axes
const xMin = 0, xMax = maxFieldDeg;
const yMin = 0.4, yMax = 1.0;

function xPx(v) { return pad.left + (v / xMax) * pw; }
function yPx(v) { return pad.top + ph - ((v - yMin) / (yMax - yMin)) * ph; }

// Grid
ctx.strokeStyle = '#e5e7eb';
ctx.lineWidth = 1;
for (let y = yMin; y <= yMax + 0.001; y += 0.1) {
  ctx.beginPath(); ctx.moveTo(pad.left, yPx(y)); ctx.lineTo(W - pad.right, yPx(y)); ctx.stroke();
}
for (let x = 0; x <= xMax; x += 2) {
  ctx.beginPath(); ctx.moveTo(xPx(x), pad.top); ctx.lineTo(xPx(x), H - pad.bottom); ctx.stroke();
}

// Axes lines
ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, H - pad.bottom); ctx.lineTo(W - pad.right, H - pad.bottom); ctx.stroke();

// Axis labels
ctx.fillStyle = '#000'; ctx.font = '13px Arial'; ctx.textAlign = 'center';
for (let x = 0; x <= xMax; x += 2) {
  ctx.fillText(x + '°', xPx(x), H - pad.bottom + 20);
}
ctx.textAlign = 'right';
for (let y = yMin; y <= yMax + 0.001; y += 0.1) {
  ctx.fillText(y.toFixed(1), pad.left - 8, yPx(y) + 4);
}
ctx.save(); ctx.translate(16, pad.top + ph / 2); ctx.rotate(-Math.PI / 2);
ctx.textAlign = 'center'; ctx.font = '14px Arial'; ctx.fillText('Modulation', 0, 0); ctx.restore();
ctx.textAlign = 'center'; ctx.font = '14px Arial';
ctx.fillText('Field Angle (degrees)', pad.left + pw / 2, H - 6);

// Draw curves
function drawCurve(data, color, dashed) {
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  if (dashed) ctx.setLineDash([8, 4]); else ctx.setLineDash([]);
  ctx.beginPath();
  for (let i = 0; i < data.length; i++) {
    const fieldDeg = (i / (data.length - 1)) * maxFieldDeg;
    const px = xPx(fieldDeg), py = yPx(data[i]);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

freqData.forEach(f => {
  drawCurve(f.T, f.color, false);
  drawCurve(f.S, f.color, true);
});

// Legend
const leg = document.getElementById('legend');
freqData.forEach(f => {
  leg.innerHTML += `<span class="legend-item"><span class="legend-line" style="background:${f.color}"></span>${f.freq} cy/mm T</span>`;
  leg.innerHTML += `<span class="legend-item"><span class="legend-dash" style="border-color:${f.color}"></span>${f.freq} cy/mm S</span>`;
});
</script>
