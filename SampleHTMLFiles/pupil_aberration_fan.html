// Build legend

    item.className = 'legend-item';

const gridEl = document.getElementById('grid');
const tooltipEl = document.getElementById('tooltip');
const charts = [];

fields.forEach(f => {
    ['tangential', 'sagittal'].forEach(fanType => {
        const container = document.createElement('div');
        container.className = 'chart-container';
        const title = document.createElement('div');
        title.className = 'chart-title';
        title.textContent = `${fanType.charAt(0).toUpperCase() + fanType.slice(1)} Fan — Field ${f.label}`;
        container.appendChild(title);
        const canvas = document.createElement('canvas');
        canvas.width = 640;
        canvas.height = 320;
        container.appendChild(canvas);
        gridEl.appendChild(container);
        charts.push({ canvas, field: f, fanType, data: f[fanType] });
    });
});

function drawChart(chart) {
    const { canvas, data, fanType, field } = chart;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const pad = { top: 10, right: 20, bottom: 40, left: 60 };
    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;

    // Find y range
    let yMin = Infinity, yMax = -Infinity;
    data.data.forEach(series => {
        series.forEach(v => { yMin = Math.min(yMin, v); yMax = Math.max(yMax, v); });
    });
    const yPad = (yMax - yMin) * 0.08 || 0.1;
    yMin -= yPad; yMax += yPad;

    // Store for tooltip
    chart.pad = pad; chart.plotW = plotW; chart.plotH = plotH;
    chart.yMin = yMin; chart.yMax = yMax;

    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#0f1a30';
    ctx.fillRect(pad.left, pad.top, plotW, plotH);

    // Grid
    ctx.strokeStyle = '#253050';
    ctx.lineWidth = 0.5;
    const yTicks = 6;
    for (let i = 0; i <= yTicks; i++) {
        const y = pad.top + (i / yTicks) * plotH;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + plotW, y); ctx.stroke();
    }
    const xTicks = 10;
    for (let i = 0; i <= xTicks; i++) {
        const x = pad.left + (i / xTicks) * plotW;
        ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + plotH); ctx.stroke();
    }

    // Zero line
    if (yMin < 0 && yMax > 0) {
        const zeroY = pad.top + plotH * (1 - (0 - yMin) / (yMax - yMin));
        ctx.strokeStyle = '#556';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(pad.left, zeroY); ctx.lineTo(pad.left + plotW, zeroY); ctx.stroke();
        ctx.setLineDash([]);
    }

    // Data
    data.data.forEach((series, wi) => {
        ctx.strokeStyle = wlColors[wi];
        ctx.lineWidth = 2;
        ctx.beginPath();
        series.forEach((v, j) => {
            const px = data.py[j];
            const x = pad.left + ((px + 1) / 2) * plotW;
            const y = pad.top + plotH * (1 - (v - yMin) / (yMax - yMin));
            if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    });

    // Axes labels
    ctx.fillStyle = '#999';
    ctx.font = '11px Segoe UI';
    ctx.textAlign = 'center';
    for (let i = 0; i <= xTicks; i++) {
        const px = -1 + (2 * i / xTicks);
        const x = pad.left + (i / xTicks) * plotW;
        ctx.fillText(px.toFixed(1), x, H - pad.bottom + 16);
    }
    ctx.fillText(fanType === 'tangential' ? 'Py (pupil Y)' : 'Px (pupil X)', pad.left + plotW / 2, H - 4);

    ctx.textAlign = 'right';
    for (let i = 0; i <= yTicks; i++) {
        const val = yMax - (i / yTicks) * (yMax - yMin);
        const y = pad.top + (i / yTicks) * plotH;
        ctx.fillText(val.toFixed(2), pad.left - 6, y + 4);
    }

    ctx.save();
    ctx.translate(12, pad.top + plotH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.textAlign = 'center';
    ctx.fillText('Aberration (%)', 0, 0);
    ctx.restore();
}

charts.forEach(drawChart);

// Tooltip
document.addEventListener('mousemove', e => {
    let found = false;
    charts.forEach(chart => {
        const rect = chart.canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (chart.canvas.width / rect.width);
        const my = (e.clientY - rect.top) * (chart.canvas.height / rect.height);
        const { pad, plotW, plotH, yMin, yMax, data } = chart;
        if (mx >= pad.left && mx <= pad.left + plotW && my >= pad.top && my <= pad.top + plotH) {
            const px = ((mx - pad.left) / plotW) * 2 - 1;
            // Find nearest data index
            let bestIdx = 0, bestDist = Infinity;
            data.py.forEach((p, i) => {
                const d = Math.abs(p - px);
                if (d < bestDist) { bestDist = d; bestIdx = i; }
            });
            let html = `<b>P = ${data.py[bestIdx].toFixed(2)}</b><br>`;
            data.data.forEach((series, wi) => {
                html += `<span style="color:${wlColors[wi]}">${wavelengths[wi].toFixed(4)} µm: ${series[bestIdx].toFixed(4)}%</span><br>`;
            });
            tooltipEl.innerHTML = html;
            tooltipEl.style.display = 'block';
            tooltipEl.style.left = (e.clientX + 14) + 'px';
            tooltipEl.style.top = (e.clientY - 10) + 'px';
            found = true;
        }
    });
    if (!found) tooltipEl.style.display = 'none';
});
