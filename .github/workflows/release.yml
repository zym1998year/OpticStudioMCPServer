name: Verify Windows desktop components

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - name: Build public desktop components
        shell: pwsh
        run: |
          dotnet build src/ZemaxMCP.HttpBridge/ZemaxMCP.HttpBridge.csproj -c Release
          dotnet build src/ZemaxMCP.Launcher/ZemaxMCP.Launcher.csproj -c Release
          dotnet build src/ZemaxMCP.Installer/ZemaxMCP.Installer.csproj -c Release
